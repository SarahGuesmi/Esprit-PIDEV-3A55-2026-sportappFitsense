# Configuration MySQL pour environnement de développement
# Ce fichier désactive le binary logging pour économiser de l'espace disque

[mysqld]
# Désactiver le binary logging en développement
skip-log-bin

# OU si vous devez garder binlog mais limiter la taille
# binlog_expire_logs_seconds = 86400  # 1 jour
# max_binlog_size = 100M

# Optimisations supplémentaires pour le développement
# innodb_flush_log_at_trx_commit = 2
# sync_binlog = 0

# INSTRUCTIONS D'INSTALLATION:
# 
# Pour XAMPP:
# 1. Ouvrez: C:\xampp\mysql\bin\my.ini
# 2. Ajoutez "skip-log-bin" sous la section [mysqld]
# 3. Redémarrez MySQL depuis le panneau XAMPP
#
# Pour WAMP:
# 1. Ouvrez: C:\wamp64\bin\mysql\mysql[version]\my.ini
# 2. Ajoutez "skip-log-bin" sous la section [mysqld]
# 3. Redémarrez MySQL depuis le panneau WAMP
#
# Pour MySQL Standalone:
# 1. Ouvrez: C:\ProgramData\MySQL\MySQL Server [version]\my.ini
# 2. Ajoutez "skip-log-bin" sous la section [mysqld]
# 3. Redémarrez le service MySQL
#
# Vérification:
# Exécutez dans MySQL: SHOW VARIABLES LIKE 'log_bin';
# Résultat attendu: OFF
