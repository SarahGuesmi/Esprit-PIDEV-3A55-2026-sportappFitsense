# config/services.yaml
parameters:
    consumption_upload_dir: '%kernel.project_dir%/public/uploads/consumption'
    recipes_upload_dir: '%kernel.project_dir%/public/uploads/recipes'
    rapidapi_key: '%env(RAPIDAPI_KEY)%'
    ipinfo_token: '%env(IPINFO_TOKEN)%'


services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'


    App\Service\IPInfoService:
        arguments:
            $apiToken: '%ipinfo_token%'

    App\EventListener\LoginSecurityListener:
        tags:
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Security\Http\Event\LoginSuccessEvent', method: 'onLoginSuccess' }
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Security\Http\Event\LoginFailureEvent', method: 'onLoginFailure' }

    # ⚠️ DOIT être après le bloc App\
    App\Service\ExerciseApiService:
        arguments:
            $apiKey: '%rapidapi_key%'

    App\Service\YouTubeService:
        arguments:
            $apiKey: '%env(YOUTUBE_API_KEY)%'

    App\Service\FeedbackAnalysisService:
        arguments:
            $openaiApiKey: '%env(OPENAI_API_KEY)%'


    App\EventListener\AuthenticationSuccessListener:
        tags:
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Security\Http\Event\LoginSuccessEvent', method: 'onLoginSuccess' }

    App\Service\OpenAiService:
        arguments:
            $apiKey: '%env(API_KEY)%'

    App\Service\SendGridMailerService:
        arguments:
            $httpClient: '@http_client'
