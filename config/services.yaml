# config/services.yaml
parameters:
    consumption_upload_dir: '%kernel.project_dir%/public/uploads/consumption'
    recipes_upload_dir: '%kernel.project_dir%/public/uploads/recipes'
    rapidapi_key: '%env(RAPIDAPI_KEY)%'

services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # ⚠️ DOIT être après le bloc App\
    App\Service\ExerciseApiService:
        arguments:
            $apiKey: '%rapidapi_key%'

    App\Service\YouTubeService:
        arguments:
            $apiKey: '%env(YOUTUBE_API_KEY)%'

    App\EventListener\AuthenticationSuccessListener:
        tags:
            - { name: 'kernel.event_listener', event: 'Symfony\Component\Security\Http\Event\LoginSuccessEvent', method: 'onLoginSuccess' }