security:
    # Enable the new authenticator manager (Symfony 5.3+ / 6+ default)
    enable_authenticator_manager: true

    # Password hasher configuration
    password_hashers:
        App\Entity\User:
            algorithm: auto   # good choice (uses bcrypt/argon2id/sodium based on PHP version)

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            logout:
                path: app_logout
                # target: 'auth_sign_in'   # optional - where to redirect after logout
            two_factor:
                auth_form_path: /2fa
                check_path: /2fa_check
                post_only: true
                default_target_path: /
                auth_code_parameter_name: _auth_code
                enable_csrf: true
                csrf_parameter: _csrf_token
                csrf_token_id: two_factor
                provider: app_user_provider
            # remember_me:                 # optional - if you want "Remember me" checkbox
            #     secret: '%kernel.secret%'
            #     name: APP_REMEMBER_ME
            #     lifetime: 604800 # 1 week in seconds

    # Access control rules
    access_control:
        # Account deactivated message (after failed login for inactive user)
        - { path: ^/account-deactivated, roles: PUBLIC_ACCESS }
        # Passkey / Face ID login (QR flow) - public
        - { path: ^/passkey, roles: PUBLIC_ACCESS }
        # IMPORTANT: Make reset-password routes public (no login required)
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        # Chatroom: all authenticated users (admin, coach, athlete)
        - { path: ^/chat, roles: IS_AUTHENTICATED_FULLY }
        # Your existing admin rule
        - { path: ^/admin, roles: ROLE_ADMIN }

      