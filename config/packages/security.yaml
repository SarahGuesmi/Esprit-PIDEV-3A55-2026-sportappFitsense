security:
    # Enable the new authenticator manager (Symfony 5.3+ / 6+ default)
    enable_authenticator_manager: true

    # Password hasher configuration
    password_hashers:
        App\Entity\User:
            algorithm: auto   # good choice (uses bcrypt/argon2id/sodium based on PHP version)

    # User provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email.email

    firewalls:
        main:
            lazy: true
            provider: app_user_provider
            custom_authenticator: App\Security\AppAuthenticator
            entry_point: App\Security\AppAuthenticator
            two_factor:
                auth_form_path: 2fa_login      # route name from config/routes/scheb_2fa.yaml
                check_path: 2fa_login_check    # route name from config/routes/scheb_2fa.yaml
                enable_csrf: true
            logout:
                path: app_logout
                target: auth_sign_in
            # remember_me:                 # optional - if you want "Remember me" checkbox
            #     secret: '%kernel.secret%'
            #     name: APP_REMEMBER_ME
            #     lifetime: 604800 # 1 week in seconds

    # Access control rules
    access_control:
        # 2FA routes must be accessible during the 2FA process
        - { path: ^/logout, roles: PUBLIC_ACCESS }
        - { path: ^/2fa_check, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }
        - { path: ^/2fa, roles: IS_AUTHENTICATED_2FA_IN_PROGRESS }

        # IMPORTANT: Make reset-password routes public (no login required)
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        
        # Your existing admin rule
        - { path: ^/admin, roles: ROLE_ADMIN }
        
        # Coach routes require ROLE_COACH or ROLE_USER (users can access exercise library)
        - { path: ^/coach, roles: [ROLE_COACH, ROLE_USER] }
        
        # User routes require authenticated user with ROLE_USER or ROLE_COACH
        - { path: ^/user, roles: [ROLE_USER, ROLE_COACH] }

      